baseURL = 'https://will-o-works.com/'
locale = 'en-us'
title = 'Will-o-Works'
theme = 'William'
copyright = "Will-o-Works Studios Inc."

[Params]
  [Params.assets]
    favicon = "/assets/williamface4x.png"

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[server]
  [[server.redirects]]
    force = false
    from = "/**"
    fromRe = ""
    status = 404
    to = "/404.html"