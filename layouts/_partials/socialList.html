<div class="socials-root">
    {{range site.Data.socials.socials}}

        <div class="socials-item">    
            <img class="socials-icon" alt="{{.name}}" title="{{.name}}" src="{{.icon | relURL }}">
            <!-- <p>{{.name}}</p> -->
        </div>
    </a>
    {{end}}
</div>
